spring.application.name=demo

# DB2 connection — fill in your actual values
spring.datasource.url=jdbc:db2://localhost:50000/loandb
spring.datasource.driver-class-name=com.ibm.db2.jcc.DB2Driver
spring.datasource.username=db2inst1
spring.datasource.password=password123

# Hibernate dialect tells Hibernate how to generate DB2-compatible SQL
spring.jpa.database-platform=org.hibernate.dialect.DB2Dialect

# update = add missing columns/tables but never delete existing data
# create-drop = recreate tables on every restart (good for dev, destructive in prod)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true